<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <title>Detective Matemático PWA</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #fbbf24; }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        .card { 
            background: var(--card); 
            padding: 1.5rem; 
            border-radius: 28px; 
            width: 92%; 
            max-width: 380px; 
            text-align: center; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
        }

        /* ELIMINACIÓN TOTAL DE FLECHAS */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; appearance: textfield; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 5px; 
            align-items: center; 
            margin: 1.5rem 0; 
        }

        input { 
            width: 100%; aspect-ratio: 1/1; text-align: center; font-size: 1.4rem; 
            font-weight: 900; background: #334155; border: 2px solid #475569; 
            border-radius: 12px; color: white; transition: all 0.2s; padding: 0;
        }

        input:focus { border-color: var(--primary); outline: none; background: #475569; transform: scale(1.1); }
        
        input[readonly] { background: rgba(99, 102, 241, 0.1); border-color: var(--primary); color: var(--primary); }

        .symbol { font-weight: bold; color: #64748b; font-size: 1rem; }
        
        .res-box { 
            width: 100%; aspect-ratio: 1/1; display: flex; justify-content: center; 
            align-items: center; background: #0f172a; border-radius: 10px; 
            font-weight: 900; color: var(--accent); border: 1px solid var(--accent); font-size: 0.9rem;
        }

        .btn { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 1rem; border-radius: 16px; font-weight: 800; cursor: pointer; 
            box-shadow: 0 4px 0px #4338ca; margin-bottom: 10px; font-size: 1rem;
        }

        .btn-sec { background: #475569; box-shadow: 0 4px #1e293b; }
        .btn:active { transform: translateY(3px); box-shadow: none; }

        #msg { margin-top: 1rem; font-weight: 700; min-height: 1.5rem; }
        .badge { background: #f43f5e; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; display: inline-block; }
    </style>
</head>
<body>

<div class="card">
    <div class="badge">MODO DETECTIVE</div>
    <h2 style="margin:0; color: var(--primary);">Intercambio Intruso</h2>
    <p style="color: #94a3b8; font-size: 0.8rem; margin: 5px 0;">Dos números han cambiado de lugar. ¡Reubícalos!</p>
    
    <div id="mainGrid" class="grid"></div>

    <button class="btn" onclick="check()">VERIFICAR POSICIONES</button>
    
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-sec" style="flex: 1;" onclick="location.reload()">REINTENTAR</button>
        <button class="btn btn-sec" style="flex: 1;" onclick="window.location.href='index.html'">MENÚ</button>
    </div>
    
    <div id="msg"></div>
</div>



<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }

    function generarEscenario() {
        // 1. Crear solución base aleatoria y válida
        let s = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
        
        // 2. Definir los objetivos basados en esa solución
        let h = [s[0]+s[1]-s[2], (s[3]-s[4])*s[5], s[6]+s[7]+s[8]];
        let v = [(s[0]+s[3])*s[6], s[1]-s[4]-s[7], s[2]-s[5]-s[8]];
        
        // 3. Intercambiar dos números (Swap)
        let solConError = [...s];
        let indicesValidos = [0,1,2,3,5,6,7,8]; // Excluimos el centro (índice 4)
        indicesValidos.sort(() => Math.random() - 0.5);
        
        let i1 = indicesValidos[0];
        let i2 = indicesValidos[1];
        
        // Realizamos el intercambio
        [solConError[i1], solConError[i2]] = [solConError[i2], solConError[i1]];

        return { h, v, inicial: solConError };
    }

    let juego = generarEscenario();

    function init() {
        const grid = document.getElementById('mainGrid');
        const s = juego.inicial;
        grid.innerHTML = `
            <input type="number" id="v1" value="${s[0]}"><div class="symbol">+</div><input type="number" id="v2" value="${s[1]}"><div class="symbol">-</div><input type="number" id="v3" value="${s[2]}"><div class="symbol">=</div><div class="res-box">${juego.h[0]}</div>
            <div class="symbol">+</div><div></div><div class="symbol">-</div><div></div><div class="symbol">-</div><div></div><div></div>
            <input type="number" id="v4" value="${s[3]}"><div class="symbol">-</div><input type="number" id="v5" value="${s[4]}" readonly><div class="symbol">*</div><input type="number" id="v6" value="${s[5]}"><div class="symbol">=</div><div class="res-box">${juego.h[1]}</div>
            <div class="symbol">*</div><div></div><div class="symbol">-</div><div></div><div class="symbol">-</div><div></div><div></div>
            <input type="number" id="v7" value="${s[6]}"><div class="symbol">+</div><input type="number" id="v8" value="${s[7]}"><div class="symbol">+</div><input type="number" id="v9" value="${s[8]}"><div class="symbol">=</div><div class="res-box">${juego.h[2]}</div>
            <div class="symbol">=</div><div></div><div class="symbol">=</div><div></div><div class="symbol">=</div><div></div><div></div>
            <div class="res-box">${juego.v[0]}</div><div></div><div class="res-box">${juego.v[1]}</div><div></div><div class="res-box">${juego.v[2]}</div><div></div><div></div>
        `;
    }

    function check() {
        const v = Array.from({length: 9}, (_, i) => parseInt(document.getElementById('v' + (i+1)).value));
        const m = document.getElementById('msg');

        // Validación matemática real contra los cuadros amarillos
        const h1 = (v[0] + v[1] - v[2] === juego.h[0]);
        const h2 = ((v[3] - v[4]) * v[5] === juego.h[1]);
        const h3 = (v[6] + v[7] + v[8] === juego.h[2]);
        const v1 = ((v[0] + v[3]) * v[6] === juego.v[0]);
        const v2 = (v[1] - v[4] - v[7] === juego.v[1]);
        const v3 = (v[2] - v[5] - v[8] === juego.v[2]);

        if (h1 && h2 && h3 && v1 && v2 && v3) {
            m.innerText = "🕵️ ¡Caso Resuelto! Sistema equilibrado.";
            m.style.color = "#4ade80";
        } else {
            m.innerText = "❌ Sigue habiendo errores en las líneas.";
            m.style.color = "#f43f5e";
        }
    }
    init();
</script>
</body>
</html>
