<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misión Experto: Fracciones</title>
    <style>
        :root { --primary: #f43f5e; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #fbbf24; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 1.5rem; border-radius: 28px; width: 95%; max-width: 440px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px 4px; align-items: center; margin: 1.5rem 0; }
        
        .pieza { 
            width: 100%; aspect-ratio: 1/1; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            font-size: 0.9rem; font-weight: 800; background: #334155; border: 2px solid #475569; 
            border-radius: 12px; color: white; cursor: pointer; transition: all 0.2s; padding: 2px; outline: none;
        }
        .pieza .linea-f { width: 60%; height: 2px; background: white; margin: 2px 0; }
        .pieza.selected { background-color: var(--primary) !important; border-color: white !important; box-shadow: 0 0 15px var(--primary); transform: scale(1.1); z-index: 10; }
        .pieza.fija { border-color: #0ea5e9 !important; background-color: rgba(14, 165, 233, 0.2) !important; cursor: default; }
        
        .symbol { font-weight: bold; color: #64748b; font-size: 1rem; }
        .res-box { background: #0f172a; border: 1px solid var(--accent); color: var(--accent); border-radius: 8px; font-weight: 900; font-size: 0.8rem; min-height: 40px; display: flex; justify-content: center; align-items: center; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; border: none; padding: 1rem; border-radius: 16px; font-weight: 800; cursor: pointer; color: white; transition: 0.2s; text-transform: uppercase; }
        .btn-check { background: var(--primary); box-shadow: 0 4px #b91c1c; }
        .btn-help { background: #0ea5e9; box-shadow: 0 4px #0369a1; }
        #msg { margin-top: 15px; font-weight: 700; min-height: 2.5rem; font-size: 0.9rem; }
        .mision-badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; margin-bottom: 8px; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div id="misionLabel" class="mision-badge">MISIÓN 1/3</div>
    <h2 style="margin:0; color: var(--primary);">Desafío Fraccionario</h2>
    <p style="color: #94a3b8; font-size: 0.75rem; margin: 5px 0;">¡Mueve las piezas y suma horizontalmente!</p>
    
    <div id="mainGrid" class="grid"></div>

    <div class="btn-group">
        <button class="btn btn-help" onclick="ayudar()">AYUDA (↘️)</button>
        <button class="btn btn-check" onclick="check()">VERIFICAR</button>
    </div>
    <div id="msg"></div>
</div>

<script>
    const MISIONES = [
        {
            solucion: [[1,2], [1,3], [1,6], [3,4], [1,2], [1,4], [5,6], [1,6], [1,3]],
            resultados: [1, 1.5, 1.3333],
            textRes: ["1", "3/2", "4/3"],
            piezas: [[1,6], [1,3], [1,2], [1,4], [1,2], [3,4], [1,3], [1,6], [5,6]]
        },
        {
            solucion: [[2,5], [1,5], [2,5], [1,2], [1,4], [1,4], [3,8], [1,8], [1,2]],
            resultados: [1, 1, 1],
            textRes: ["1", "1", "1"],
            piezas: [[1,4], [2,5], [3,8], [1,5], [1,2], [1,8], [2,5], [1,2], [1,4]]
        },
        {
            solucion: [[2,3], [1,6], [1,6], [3,5], [1,5], [1,5], [3,10], [1,5], [1,2]],
            resultados: [1, 1, 1],
            textRes: ["1", "1", "1"],
            piezas: [[1,5], [2,3], [3,10], [1,6], [1,5], [1,2], [1,6], [3,5], [1,5]]
        }
    ];

    let misionActual = 0;
    let piezasJuego = [];
    let seleccionadoIdx = null;
    let fijas = [];

    function cargarMision() {
        piezasJuego = JSON.parse(JSON.stringify(MISIONES[misionActual].piezas));
        fijas = [];
        seleccionadoIdx = null;
        document.getElementById('misionLabel').innerText = `MISIÓN ${misionActual + 1}/3`;
        document.getElementById('msg').innerText = "";
        render();
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        const resTextos = MISIONES[misionActual].textRes;

        piezasJuego.forEach((f, i) => {
            // Crear Botón de Pieza
            const p = document.createElement('button');
            p.className = `pieza ${seleccionadoIdx === i ? 'selected' : ''} ${fijas.includes(i) ? 'fija' : ''}`;
            p.innerHTML = `<span>${f[0]}</span><div class="linea-f"></div><span>${f[1]}</span>`;
            
            p.onclick = () => {
                if (fijas.includes(i)) return;
                document.getElementById('msg').innerText = "";
                if (seleccionadoIdx === null) { 
                    seleccionadoIdx = i; 
                } else {
                    if (seleccionadoIdx !== i) {
                        const temp = piezasJuego[seleccionadoIdx];
                        piezasJuego[seleccionadoIdx] = piezasJuego[i];
                        piezasJuego[i] = temp;
                    }
                    seleccionadoIdx = null;
                }
                render();
            };
            grid.appendChild(p);

            // Añadir Símbolos y Cuadros de Resultado
            if (i % 3 < 2) {
                const s = document.createElement('div');
                s.className = 'symbol';
                s.innerText = '+';
                grid.appendChild(s);
            } else {
                const eq = document.createElement('div');
                eq.className = 'symbol';
                eq.innerText = '=';
                grid.appendChild(eq);
                
                const rb = document.createElement('div');
                rb.className = 'res-box';
                rb.innerText = resTextos[Math.floor(i/3)];
                grid.appendChild(rb);
            }
        });
    }

    function ayudar() {
        const centroIdx = 4;
        const correcta = MISIONES[misionActual].solucion[centroIdx];
        const actualIdx = piezasJuego.findIndex(f => f[0] === correcta[0] && f[1] === correcta[1]);
        
        if (actualIdx !== -1) {
            const temp = piezasJuego[centroIdx];
            piezasJuego[centroIdx] = piezasJuego[actualIdx];
            piezasJuego[actualIdx] = temp;
            if (!fijas.includes(centroIdx)) fijas.push(centroIdx);
            seleccionadoIdx = null;
            render();
            const m = document.getElementById('msg');
            m.innerText = "💡 Ayuda: Se ha ubicado la pieza central.";
            m.style.color = "#0ea5e9";
        }
    }

function check() {
    const p = piezasJuego;
    // Resultados esperados para el tablero de Monomios
    const res = [1, 1.5, 1.3333]; 
    
    const s1 = (p[0][0]/p[0][1]) + (p[1][0]/p[1][1]) + (p[2][0]/p[2][1]);
    const s2 = (p[3][0]/p[3][1]) + (p[4][0]/p[4][1]) + (p[5][0]/p[5][1]);
    const s3 = (p[6][0]/p[6][1]) + (p[7][0]/p[7][1]) + (p[8][0]/p[8][1]);

    const m = document.getElementById('msg');
    
    if (Math.abs(s1 - res[0]) < 0.01 && Math.abs(s2 - res[1]) < 0.01 && Math.abs(s3 - res[2]) < 0.01) {
        m.style.color = "var(--success)";
        m.innerText = "🏆 ¡SISTEMA ALINEADO! Generando Certificado...";
        
        setTimeout(() => {
            let nombre = prompt("¡Felicidades Maestro! Ingresa tu nombre:");
            if (!nombre) nombre = "Estudiante";
            
            // Ajuste solicitado: El tema ahora es Monomios
            const tema = encodeURIComponent("Monomios (Nivel Maestro)");
            const nom = encodeURIComponent(nombre);
            
            window.location.href = `diploma.html?nombre=${nom}&nota=5.0&tema=${tema}`;
        }, 1000);
    } else {
        m.innerText = "❌ Error de cálculo. Las sumas no coinciden.";
        m.style.color = "#f43f5e";
    }
}



    window.onload = cargarMision;
</script>
</body>
</html>
